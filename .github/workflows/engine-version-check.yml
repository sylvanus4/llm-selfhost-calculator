name: engine-version-check
# Daily check for new vLLM / SGLang / TensorRT-LLM releases vs the pinned versions
# in data/*-support.json. On drift it opens (or comments on) a tracking issue with the
# exact bump commands. It does NOT auto-edit data files — version-card highlight prose
# must be curated from the release notes (no fabrication); apply with scripts/bump-engine-version.mjs.
on:
  schedule:
    - cron: "0 1 * * *"        # 01:00 UTC = 10:00 KST, daily
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check engine versions vs pins
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-engine-versions.mjs | tee /tmp/report.txt
      - name: File / update drift issue
        if: steps.check.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/check-engine-versions.mjs --json > /tmp/report.json
          BODY=$(node -e '
            const r=require("/tmp/report.json");
            let s="Automated daily check found newer upstream engine release(s).\n\n";
            s+="| engine | pinned | upstream | action |\n|---|---|---|---|\n";
            for(const x of r.results){
              if(x.error){ s+=`| ${x.label} | ${x.pinned} | (error) | \`${x.error}\` |\n`; continue; }
              const act = x.drift ? `\`node scripts/bump-engine-version.mjs ${x.engine} ${x.latest}\`` : "up to date";
              s+=`| ${x.label} | ${x.pinned} | ${x.latest||"?"} | ${act} |\n`;
            }
            s+="\nPatch bumps within the same minor are safe to auto-apply (version pin + latest_patch + image tag).\n";
            s+="New minors need a curated version card — summarize the release notes into versions[].highlights (ko+en), then bump. Run the `llm-selfhost-calc-maintainer` skill to do this with LLM curation.\n";
            s+=`\n_generated ${r.generated_utc}_`;
            console.log(s);
          ')
          TITLE="chore: engine version drift detected"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "engine-version-drift" 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
